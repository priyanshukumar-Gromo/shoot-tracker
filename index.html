<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Shoot Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1115; --panel:#161922; --panel2:#1d2230; --line:#262c3a;
  --txt:#e8ebf2; --muted:#9aa3b5; --faint:#6b7384;
  --brand:#10c574; --brand2:#0bd6a0; --brand-soft:rgba(16,197,116,.14);
  --accent:#6d8cff; --shadow:0 10px 30px rgba(0,0,0,.35);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(1200px 600px at 80% -10%,#1a2030 0%,var(--bg) 55%);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* Sidebar */
.side{background:linear-gradient(180deg,#12151d,#0d0f15);border-right:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-weight:800;color:#04150d;font-size:18px;box-shadow:0 6px 16px rgba(16,197,116,.4)}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.2px}
.brand span{font-size:11px;color:var(--muted);font-weight:500}

.syncpill{font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;text-align:center;border:1px solid var(--line);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.syncpill.local{color:var(--faint)}
.syncpill.ok{color:var(--brand2);background:var(--brand-soft);border-color:transparent}
.syncpill.saving{color:#f5a623;border-color:rgba(245,166,35,.35)}
.syncpill.off{color:#ff6b6b;border-color:rgba(255,107,107,.35)}
.monthsel{padding:2px 4px 14px;border-bottom:1px solid var(--line);margin-bottom:12px;display:flex;flex-direction:column;gap:9px}
.monthsel label{font-size:10px;letter-spacing:.7px;color:var(--faint);font-weight:700}
.monthsel select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:10px 12px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;outline:none;cursor:pointer;width:100%}
.monthsel select:focus{border-color:var(--brand)}
.newmonth{background:var(--brand-soft)!important;color:var(--brand2)!important;border-color:transparent!important}

.nav{display:flex;flex-direction:column;gap:4px;margin-top:2px}
.nav button{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:11px 13px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:.15s}
.nav button .ic{font-size:17px;width:20px;text-align:center}
.nav button:hover{background:var(--panel2);color:var(--txt)}
.nav button.active{background:var(--brand-soft);color:var(--brand2);font-weight:600}
.nav .count{margin-left:auto;font-size:11px;background:var(--panel2);color:var(--muted);padding:2px 8px;border-radius:20px;font-weight:600}
.nav button.active .count{background:rgba(16,197,116,.22);color:var(--brand2)}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid var(--line)}
.sbtn{display:flex;align-items:center;gap:9px;justify-content:center;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:9px;border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit;transition:.15s}
.sbtn:hover{color:var(--txt);border-color:#39415a}
.sbtn.danger:hover{color:#ff6b6b;border-color:#ff6b6b}

/* Main */
.main{padding:30px 38px 60px;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap}
.page-title h2{font-size:24px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mbadge{font-size:12px;font-weight:700;background:var(--brand-soft);color:var(--brand2);padding:4px 11px;border-radius:20px}
.page-title p{color:var(--muted);font-size:13.5px;margin-top:3px}
.search{position:relative}
.search input{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:11px 14px 11px 38px;border-radius:11px;width:280px;font-size:13.5px;font-family:inherit;outline:none;transition:.15s}
.search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.search .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:15px}
.btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04150d;border:none;padding:11px 18px;border-radius:11px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:.15s;box-shadow:0 6px 18px rgba(16,197,116,.32)}
.btn:hover{transform:translateY(-1px)}
.btn.ghost{background:var(--panel2);color:var(--txt);box-shadow:none;border:1px solid var(--line)}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:16px;margin-bottom:26px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent-c,var(--brand-soft));opacity:.5}
.stat .lab{color:var(--muted);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.stat .val{font-size:30px;font-weight:800;margin-top:8px;letter-spacing:-1px}
.stat .dot{width:9px;height:9px;border-radius:50%;display:inline-block}

/* Filters */
.filters{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:30px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.chip:hover{color:var(--txt)}
.chip.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.chip .cdot{width:8px;height:8px;border-radius:50%}

/* Table */
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);font-weight:700;padding:14px 16px;background:var(--panel2);border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--panel2)}
tbody tr:last-child td{border-bottom:none}
.ttitle{font-weight:600;color:var(--txt)}
.tsub{color:var(--faint);font-size:12px;margin-top:2px}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:7px;font-size:11.5px;font-weight:600;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
.muted{color:var(--faint)}
.link{color:var(--accent);text-decoration:none;font-weight:600;font-size:12.5px}
.link:hover{text-decoration:underline}

/* status select */
.status-sel{appearance:none;border:1px solid transparent;border-radius:8px;padding:5px 26px 5px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;background-position:right 8px center;background-repeat:no-repeat;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>")}
.status-sel:focus{box-shadow:0 0 0 3px rgba(255,255,255,.08)}

/* row actions */
.ract{display:flex;gap:6px;justify-content:flex-end}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;font-size:13px;display:grid;place-items:center;transition:.15s}
.iconbtn:hover{color:var(--txt);border-color:#39415a}
.iconbtn.del:hover{color:#ff6b6b;border-color:#ff6b6b}

.empty{padding:60px 20px;text-align:center;color:var(--faint)}
.empty .big{font-size:40px;margin-bottom:10px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(5,7,11,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.mhead h3{font-size:17px;font-weight:700}
.mbody{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
.field input,.field select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:10px 12px;border-radius:10px;font-size:13.5px;font-family:inherit;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.mfoot{padding:16px 24px 22px;display:flex;justify-content:flex-end;gap:10px}
.x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.x:hover{color:var(--txt)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--txt);color:var(--bg);padding:12px 22px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{position:static;height:auto}
  .main{padding:22px 18px 60px}
  .search input{width:170px}
  .mbody{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">CS</div>
      <div><h1>Shoot Tracker</h1><span>Content Production</span></div>
    </div>

    <div id="syncPill" class="syncpill local">● Local only</div>

    <div class="monthsel">
      <label>TRACKING MONTH</label>
      <select id="monthDrop"></select>
      <button class="sbtn newmonth" id="newMonthBtn">＋ Start New Month</button>
    </div>

    <nav class="nav" id="nav">
      <button data-view="dashboard"><span class="ic">▦</span> Dashboard</button>
      <button data-view="videos"><span class="ic">🎬</span> Videos <span class="count" id="c-videos">0</span></button>
      <button data-view="creatives"><span class="ic">🎨</span> Creatives <span class="count" id="c-creatives">0</span></button>
      <button data-view="banners"><span class="ic">🖼️</span> Banners <span class="count" id="c-banners">0</span></button>
    </nav>
    <div class="side-foot">
      <button class="sbtn" id="exportBtn">⬇ Export CSV</button>
      <button class="sbtn danger" id="delMonthBtn">🗑 Delete This Month</button>
      <button class="sbtn danger" id="resetBtn">↺ Reset All Data</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="page-title"><h2 id="pgTitle">Dashboard</h2><p id="pgSub">Overview of all content production</p></div>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="search" id="searchWrap" style="display:none"><span class="si">⌕</span><input id="search" placeholder="Search tasks..."></div>
        <button class="btn" id="addBtn" style="display:none">＋ New Task</button>
      </div>
    </div>

    <div id="stats" class="stats"></div>
    <div id="filters" class="filters" style="display:none"></div>
    <div id="content"></div>
  </main>
</div>

<!-- Task Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead"><h3 id="modalTitle">New Task</h3><button class="x" id="closeModal">&times;</button></div>
    <div class="mbody" id="modalBody"></div>
    <div class="mfoot">
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn" id="saveBtn">Save Task</button>
    </div>
  </div>
</div>

<!-- Month Modal -->
<div class="overlay" id="monthOverlay">
  <div class="modal" style="max-width:430px">
    <div class="mhead"><h3>Start New Month</h3><button class="x" id="closeMonth">&times;</button></div>
    <div class="mbody">
      <div class="field"><label>Month</label><select id="newMonthSel"></select></div>
      <div class="field"><label>Year</label><select id="newYearSel"></select></div>
      <div class="field full"><p style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:-2px">A fresh empty board will be created for <strong>Videos</strong>, <strong>Creatives</strong> & <strong>Banners</strong>. Your existing months stay saved and are always viewable from the dropdown.</p></div>
    </div>
    <div class="mfoot">
      <button class="btn ghost" id="cancelMonth">Cancel</button>
      <button class="btn" id="createMonth">Create Month</button>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   TEAM SYNC CONFIG  —  paste your free Supabase details between the quotes.
   Leave both blank to run in local-only mode (data stays in this browser).
   Setup steps are in the README / chat. The anon key is a PUBLIC client key.
   ===================================================================== */
const SB = {
  url: "",   // e.g. "https://abcd1234.supabase.co"
  key: ""    // your project's anon public key
};
const SB_ON = !!(SB.url && SB.key);
const SB_ROW = 'shared';   // single shared board; change to e.g. team name if you want separate boards

const SEED = JSON.parse(document.getElementById('seed').textContent);
const LS_KEY = 'shootTrackerData_v2';
const LS_OLD = 'shootTrackerData_v1';
const FALLBACK_MONTH = '2026-05';
const TODAY_MONTH = '2026-06';

/* ---- status config per section ---- */
const STATUS = {
  videos:   ['Pending','Scripting','Shoot Done','In Progress','Edited','Uploaded','Rejected'],
  creatives:['Pending','In Progress','Review','Done','Rejected'],
  banners:  ['Pending','In Progress','Review','Done','Rejected']
};
const STATUS_COLOR = {
  'Pending':'#9aa3b5','Scripting':'#6d8cff','Shoot Done':'#b07cff','In Progress':'#f5a623',
  'Edited':'#22c3d6','Review':'#b07cff','Uploaded':'#10c574','Done':'#10c574','Rejected':'#ff5d6c',
  '':'#5a6072','Not Set':'#5a6072'
};
function colorFor(s){return STATUS_COLOR[s]||'#9aa3b5';}
function hex2rgba(h,a){const n=parseInt(h.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}

/* ---- columns per section ---- */
const COLS = {
  videos:[
    {k:'type',label:'Type',type:'select',opts:['Yt short form','YT long form','IG Reel','Ads','App walkthrough','Story','Other']},
    {k:'context',label:'Title / Context',type:'text',main:true,req:true},
    {k:'shoot',label:'Shoot Date',type:'text'},
    {k:'editing',label:'Editing Date',type:'text'},
    {k:'finalEdit',label:'Final Edit',type:'text'},
    {k:'deadline',label:'Deadline',type:'text'},
    {k:'script',label:'Script',type:'text'},
    {k:'raw',label:'Raw Link',type:'text'},
    {k:'final',label:'Final Link',type:'text'},
  ],
  creatives:[
    {k:'date',label:'Date',type:'text'},
    {k:'ctype',label:'Content Type',type:'select',opts:['Carousel','Story','Templates','Cover/ Thumbnail','Static creative','GIF','Other']},
    {k:'title',label:'Content Title',type:'text',main:true,req:true},
  ],
  banners:[
    {k:'date',label:'Date',type:'text'},
    {k:'title',label:'Banner Title',type:'text',main:true,req:true},
    {k:'assignedBy',label:'Assigned By',type:'text'},
  ]
};
const META = {
  videos:{title:'Videos',sub:'YouTube, Reels, Ads & shoots',icon:'🎬'},
  creatives:{title:'Creatives',sub:'Carousels, stories & thumbnails',icon:'🎨'},
  banners:{title:'Banners',sub:'Campaign & homepage banners',icon:'🖼️'},
};
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const pad=n=>String(n).padStart(2,'0');
function monthLabel(mk){const [y,m]=mk.split('-');return MONTH_NAMES[(+m)-1]+' '+y;}

/* ---- date -> month bucketing ---- */
function parseMonth(s){
  if(!s)return null; s=String(s).trim(); if(!s||s.toUpperCase()==='N/A')return null;
  let m;
  if(m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/)){return mk(m[1],m[2]);}        // YYYY-MM-DD
  if(m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/)){return mk(m[3],m[2]);}// DD-MM-YYYY (day first)
  if(m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2})$/)){return mk('20'+m[3],m[2]);}// DD-MM-YY
  return null;
}
function mk(y,mo){mo=+mo; if(mo<1||mo>12)return null; return y+'-'+pad(mo);}
function dateFieldFor(sec,r){
  if(sec==='videos')return r.shoot||r.editing||r.finalEdit||r.deadline;
  return r.date;
}
function bucketize(flat){
  const months={};
  const ensure=k=>{if(!months[k])months[k]={videos:[],creatives:[],banners:[]};return months[k];};
  ['videos','creatives','banners'].forEach(sec=>{
    (flat[sec]||[]).forEach(r=>{
      const k=parseMonth(dateFieldFor(sec,r))||FALLBACK_MONTH;
      ensure(k)[sec].push(r);
    });
  });
  ensure(TODAY_MONTH); // always make the current month available to work in
  const keys=Object.keys(months).sort();
  return {months,current: months[TODAY_MONTH]?TODAY_MONTH:keys[keys.length-1]};
}

/* ---- state ---- */
let data;
let view = 'dashboard';
let searchTerm = '';
let activeFilter = {videos:'All',creatives:'All',banners:'All'};

function load(){
  try{const v2=localStorage.getItem(LS_KEY);if(v2){const d=JSON.parse(v2);if(d&&d.months)return d;}}catch(e){}
  try{const v1=localStorage.getItem(LS_OLD);if(v1)return bucketize(JSON.parse(v1));}catch(e){}
  return bucketize(JSON.parse(JSON.stringify(SEED)));
}
function save(){
  localStorage.setItem(LS_KEY,JSON.stringify(data));
  if(SB_ON){data._rev=(data._rev||0)+1;cloudSave();}
}

/* ---- cloud (Supabase) sync ---- */
function HDR(){return {'apikey':SB.key,'Authorization':'Bearer '+SB.key,'Content-Type':'application/json','Prefer':'return=minimal'};}
function setSync(state,label){const p=document.getElementById('syncPill');if(!p)return;p.className='syncpill '+state;p.textContent='● '+label;}
async function cloudLoad(){
  try{
    const res=await fetch(`${SB.url}/rest/v1/tracker_state?id=eq.${SB_ROW}&select=data`,{headers:HDR()});
    if(!res.ok)return null;
    const arr=await res.json();
    if(arr&&arr[0]&&arr[0].data&&arr[0].data.months)return arr[0].data;
    return null;
  }catch(e){return null;}
}
let saveTimer=null;
function cloudSave(){
  clearTimeout(saveTimer);
  setSync('saving','Saving…');
  saveTimer=setTimeout(async()=>{
    try{
      let res=await fetch(`${SB.url}/rest/v1/tracker_state?id=eq.${SB_ROW}`,{method:'PATCH',headers:HDR(),body:JSON.stringify({data:data})});
      // If the row doesn't exist yet, create it
      const probe=await fetch(`${SB.url}/rest/v1/tracker_state?id=eq.${SB_ROW}&select=id`,{headers:HDR()});
      const exists=(await probe.json()).length>0;
      if(!exists){res=await fetch(`${SB.url}/rest/v1/tracker_state`,{method:'POST',headers:HDR(),body:JSON.stringify({id:SB_ROW,data:data})});}
      setSync(res.ok?'ok':'off',res.ok?'Synced':'Sync error');
    }catch(e){setSync('off','Offline');}
  },500);
}
function startPolling(){
  setInterval(async()=>{
    if(document.getElementById('overlay').classList.contains('show'))return;
    if(document.getElementById('monthOverlay').classList.contains('show'))return;
    const r=await cloudLoad();
    if(r&&(r._rev||0)>(data._rev||0)){
      if(!data.months[data.current])data.current=Object.keys(r.months).sort().pop();
      else { const keep=data.current; data=r; data.current=r.months[keep]?keep:Object.keys(r.months).sort().pop(); }
      localStorage.setItem(LS_KEY,JSON.stringify(data));
      render();setSync('ok','Synced');
    }
  },8000);
}
async function init(){
  if(SB_ON){
    setSync('saving','Connecting…');
    const remote=await cloudLoad();
    if(remote){data=remote;setSync('ok','Synced');}
    else{data=load();await new Promise(r=>{cloudSave();setTimeout(r,700);});}
    startPolling();
  }else{
    data=load();
    setSync('local','Local only');
  }
  render();
}
function cur(){return data.months[data.current];}
function monthKeys(){return Object.keys(data.months).sort();}

/* ---- helpers ---- */
function normStatus(sec,s){
  if(!s)return 'Pending';
  const f=STATUS[sec].find(x=>x.toLowerCase()===s.toLowerCase());
  return f||s;
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isLink(s){return /^https?:\/\//i.test(s)||/drive|link/i.test(s);}

/* =========== RENDER =========== */
function render(){
  renderMonthDrop();
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  ['videos','creatives','banners'].forEach(s=>document.getElementById('c-'+s).textContent=cur()[s].length);

  const isDash = view==='dashboard';
  document.getElementById('searchWrap').style.display=isDash?'none':'block';
  document.getElementById('addBtn').style.display=isDash?'none':'inline-flex';
  document.getElementById('filters').style.display=isDash?'none':'flex';

  if(isDash){renderDashboard();return;}
  const m=META[view];
  document.getElementById('pgTitle').innerHTML=`${m.title} <span class="mbadge">${monthLabel(data.current)}</span>`;
  document.getElementById('pgSub').textContent=m.sub;
  renderSectionStats();
  renderFilters();
  renderTable();
}

function renderMonthDrop(){
  const sel=document.getElementById('monthDrop');
  sel.innerHTML=monthKeys().map(k=>`<option value="${k}" ${k===data.current?'selected':''}>${monthLabel(k)}</option>`).join('');
}

function statusCounts(sec){const c={};cur()[sec].forEach(r=>{const s=normStatus(sec,r.status);c[s]=(c[s]||0)+1;});return c;}

function renderDashboard(){
  document.getElementById('pgTitle').innerHTML=`Dashboard <span class="mbadge">${monthLabel(data.current)}</span>`;
  document.getElementById('pgSub').textContent='Overview for '+monthLabel(data.current)+' · '+monthKeys().length+' month(s) tracked';
  const d=cur();
  const total=d.videos.length+d.creatives.length+d.banners.length;
  const cnt=(test)=>['videos','creatives','banners'].reduce((a,s)=>a+d[s].filter(r=>test(s,normStatus(s,r.status))).length,0);
  const done=cnt((s,st)=>['Uploaded','Done'].includes(st));
  const prog=cnt((s,st)=>['In Progress','Scripting','Shoot Done','Edited','Review'].includes(st));
  const pend=cnt((s,st)=>st==='Pending');
  const rej=cnt((s,st)=>st==='Rejected');
  const pct=total?Math.round(done/total*100):0;

  const cards=[
    ['Total Tasks',total,'#6d8cff'],['Completed',done,'#10c574'],
    ['In Progress',prog,'#f5a623'],['Pending',pend,'#9aa3b5'],['Rejected',rej,'#ff5d6c']
  ].map(([l,v,c])=>`<div class="stat" style="--accent-c:${hex2rgba(c,.18)}"><div class="lab"><span class="dot" style="background:${c}"></span>${l}</div><div class="val">${v}</div></div>`).join('');
  document.getElementById('stats').innerHTML=cards;

  let html=`<div class="tablewrap" style="margin-bottom:22px"><div style="padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center"><strong style="font-size:15px">Completion · ${monthLabel(data.current)}</strong><span style="color:var(--muted);font-size:13px">${done}/${total} done · ${pct}%</span></div><div style="padding:22px"><div style="height:14px;background:var(--panel2);border-radius:20px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:20px;transition:.6s"></div></div></div></div>`;

  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px">';
  ['videos','creatives','banners'].forEach(sec=>{
    const m=META[sec],counts=statusCounts(sec),tot=cur()[sec].length;
    const rows=STATUS[sec].map(st=>{const n=counts[st]||0;const w=tot?Math.round(n/tot*100):0;
      return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span style="color:var(--muted);display:flex;align-items:center;gap:7px"><span style="width:8px;height:8px;border-radius:50%;background:${colorFor(st)}"></span>${st}</span><span style="font-weight:600">${n}</span></div><div style="height:6px;background:var(--panel2);border-radius:10px;overflow:hidden"><div style="height:100%;width:${w}%;background:${colorFor(st)};border-radius:10px"></div></div></div>`;
    }).join('');
    html+=`<div class="tablewrap" style="cursor:pointer" onclick="go('${sec}')"><div style="padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px"><div style="font-size:22px">${m.icon}</div><div><strong style="font-size:15px">${m.title}</strong><div class="tsub">${tot} tasks</div></div><span class="link" style="margin-left:auto">View →</span></div><div style="padding:18px 22px">${rows||'<span class=muted>No tasks yet</span>'}</div></div>`;
  });
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

function renderSectionStats(){
  const sec=view,counts=statusCounts(sec),tot=cur()[sec].length;
  const done=cur()[sec].filter(r=>['Uploaded','Done'].includes(normStatus(sec,r.status))).length;
  const cards=[['Total',tot,'#6d8cff'],['Completed',done,'#10c574'],
    ['Active',cur()[sec].filter(r=>['In Progress','Scripting','Shoot Done','Edited','Review'].includes(normStatus(sec,r.status))).length,'#f5a623'],
    ['Pending',counts['Pending']||0,'#9aa3b5']]
    .map(([l,v,c])=>`<div class="stat" style="--accent-c:${hex2rgba(c,.18)}"><div class="lab"><span class="dot" style="background:${c}"></span>${l}</div><div class="val">${v}</div></div>`).join('');
  document.getElementById('stats').innerHTML=cards;
}

function renderFilters(){
  const sec=view,counts=statusCounts(sec);
  let h=`<div class="chip ${activeFilter[sec]==='All'?'active':''}" onclick="setFilter('All')">All <span style="opacity:.6">${cur()[sec].length}</span></div>`;
  STATUS[sec].forEach(st=>{const n=counts[st]||0;
    h+=`<div class="chip ${activeFilter[sec]===st?'active':''}" onclick="setFilter('${st}')"><span class="cdot" style="background:${colorFor(st)}"></span>${st} <span style="opacity:.6">${n}</span></div>`;
  });
  document.getElementById('filters').innerHTML=h;
}

function filteredRows(){
  const sec=view;
  return cur()[sec].map((r,i)=>({r,i})).filter(({r})=>{
    if(activeFilter[sec]!=='All'&&normStatus(sec,r.status)!==activeFilter[sec])return false;
    if(searchTerm){const blob=Object.values(r).join(' ').toLowerCase();if(!blob.includes(searchTerm.toLowerCase()))return false;}
    return true;
  });
}

function renderTable(){
  const sec=view,cols=COLS[sec],rows=filteredRows();
  let head='<tr>';cols.forEach(c=>head+=`<th>${c.label}</th>`);head+='<th>Status</th><th style="text-align:right">Actions</th></tr>';
  if(!rows.length){
    const msg=cur()[sec].length?'Try a different filter or search.':'This month has no '+sec+' yet — add your first task.';
    document.getElementById('content').innerHTML=`<div class="tablewrap"><div class="empty"><div class="big">🗂️</div><strong>No tasks found</strong><p style="margin-top:6px">${msg}</p></div></div>`;
    return;
  }
  let body='';
  rows.forEach(({r,i})=>{
    let tds='';
    cols.forEach(c=>{
      let v=r[c.k]||'';
      if(c.main){tds+=`<td><div class="ttitle">${esc(v)||'<span class=muted>Untitled</span>'}</div></td>`;}
      else if(c.k==='type'||c.k==='ctype'){tds+=`<td>${v?`<span class="tag">${esc(v)}</span>`:'<span class="muted">—</span>'}</td>`;}
      else if(['script','raw','final'].includes(c.k)){tds+=`<td>${v?(isLink(v)?`<span class="link">${esc(v)}</span>`:`<span class="muted">${esc(v)}</span>`):'<span class="muted">—</span>'}</td>`;}
      else{tds+=`<td>${v?esc(v):'<span class="muted">—</span>'}</td>`;}
    });
    const st=normStatus(sec,r.status),col=colorFor(st);
    let opts=STATUS[sec].map(o=>`<option ${o===st?'selected':''}>${o}</option>`).join('');
    tds+=`<td><select class="status-sel" style="color:${col};background-color:${hex2rgba(col,.14)};border-color:${hex2rgba(col,.35)}" onchange="changeStatus(${i},this.value)">${opts}</select></td>`;
    tds+=`<td><div class="ract"><button class="iconbtn" title="Edit" onclick="openEdit(${i})">✎</button><button class="iconbtn del" title="Delete" onclick="del(${i})">🗑</button></div></td>`;
    body+=`<tr>${tds}</tr>`;
  });
  document.getElementById('content').innerHTML=`<div class="tablewrap"><div class="tscroll"><table><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
}

/* =========== ACTIONS =========== */
function go(v){view=v;searchTerm='';document.getElementById('search').value='';render();}
function setFilter(f){activeFilter[view]=f;render();}
function changeStatus(i,val){cur()[view][i].status=val;save();toast('Status updated → '+val);render();}
function del(i){
  const sec=view,name=cur()[sec][i][COLS[sec].find(c=>c.main).k]||'this task';
  if(confirm('Delete "'+name+'"?')){cur()[sec].splice(i,1);save();toast('Task deleted');render();}
}
function switchMonth(mk){data.current=mk;save();render();}

let editIndex=null;
function openAdd(){editIndex=null;openModal();}
function openEdit(i){editIndex=i;openModal(cur()[view][i]);}
function openModal(rec){
  const sec=view,cols=COLS[sec];
  document.getElementById('modalTitle').textContent=(rec?'Edit ':'New ')+META[sec].title.replace(/s$/,'')+' · '+monthLabel(data.current);
  let h='';
  cols.forEach(c=>{
    const v=rec?(rec[c.k]||''):'';
    h+=`<div class="field ${c.main?'full':''}"><label>${c.label}${c.req?' *':''}</label>`;
    if(c.type==='select'){h+=`<select data-k="${c.k}"><option value="">—</option>${c.opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;}
    else{h+=`<input data-k="${c.k}" value="${esc(v)}" placeholder="${c.label}">`;}
    h+=`</div>`;
  });
  const st=rec?normStatus(sec,rec.status):'Pending';
  h+=`<div class="field full"><label>Status</label><select data-k="status">${STATUS[sec].map(o=>`<option ${o===st?'selected':''}>${o}</option>`).join('')}</select></div>`;
  document.getElementById('modalBody').innerHTML=h;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function saveModal(){
  const sec=view,rec={};
  document.querySelectorAll('#modalBody [data-k]').forEach(el=>rec[el.dataset.k]=el.value.trim());
  const mainK=COLS[sec].find(c=>c.main).k;
  if(!rec[mainK]){toast('Please fill the title field');return;}
  if(editIndex!==null){cur()[sec][editIndex]=Object.assign(cur()[sec][editIndex],rec);toast('Task updated');}
  else{cur()[sec].unshift(rec);toast('Task added');}
  save();closeModal();render();
}

/* ---- Month modal ---- */
function openMonthModal(){
  const msel=document.getElementById('newMonthSel'),ysel=document.getElementById('newYearSel');
  msel.innerHTML=MONTH_NAMES.map((n,i)=>`<option value="${i+1}">${n}</option>`).join('');
  const baseYear=+data.current.split('-')[0];
  let years=[];for(let y=baseYear-1;y<=baseYear+2;y++)years.push(y);
  ysel.innerHTML=years.map(y=>`<option value="${y}">${y}</option>`).join('');
  // default = month after the currently selected one
  let [cy,cm]=data.current.split('-').map(Number);cm++;if(cm>12){cm=1;cy++;}
  msel.value=cm;ysel.value=cy;
  document.getElementById('monthOverlay').classList.add('show');
}
function closeMonthModal(){document.getElementById('monthOverlay').classList.remove('show');}
function createMonth(){
  const mo=+document.getElementById('newMonthSel').value,y=+document.getElementById('newYearSel').value;
  const k=y+'-'+pad(mo);
  if(!data.months[k])data.months[k]={videos:[],creatives:[],banners:[]};
  data.current=k;view='dashboard';save();closeMonthModal();render();
  toast('Now tracking '+monthLabel(k));
}
function deleteMonth(){
  if(monthKeys().length<=1){toast('Cannot delete the only month');return;}
  if(confirm('Delete all tasks for '+monthLabel(data.current)+'? This cannot be undone.')){
    delete data.months[data.current];
    data.current=monthKeys()[monthKeys().length-1];
    save();render();toast('Month deleted');
  }
}

function exportCSV(){
  const sec=view==='dashboard'?'videos':view;
  const cols=COLS[sec];const headers=cols.map(c=>c.label).concat('Status');
  const lines=[headers.join(',')];
  cur()[sec].forEach(r=>{
    const row=cols.map(c=>`"${(r[c.k]||'').replace(/"/g,'""')}"`).concat(`"${normStatus(sec,r.status)}"`);
    lines.push(row.join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${sec}_${data.current}.csv`;a.click();
  toast('Exported '+sec+' · '+monthLabel(data.current));
}
function resetData(){if(confirm('Reset ALL months back to the original sheet? Every change will be lost.')){data=bucketize(JSON.parse(JSON.stringify(SEED)));save();view='dashboard';render();toast('Data reset to original');}}

let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---- events ---- */
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)go(b.dataset.view);});
document.getElementById('monthDrop').addEventListener('change',e=>switchMonth(e.target.value));
document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value;renderTable();});
document.getElementById('addBtn').addEventListener('click',openAdd);
document.getElementById('closeModal').addEventListener('click',closeModal);
document.getElementById('cancelBtn').addEventListener('click',closeModal);
document.getElementById('saveBtn').addEventListener('click',saveModal);
document.getElementById('newMonthBtn').addEventListener('click',openMonthModal);
document.getElementById('closeMonth').addEventListener('click',closeMonthModal);
document.getElementById('cancelMonth').addEventListener('click',closeMonthModal);
document.getElementById('createMonth').addEventListener('click',createMonth);
document.getElementById('delMonthBtn').addEventListener('click',deleteMonth);
document.getElementById('exportBtn').addEventListener('click',exportCSV);
document.getElementById('resetBtn').addEventListener('click',resetData);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
document.getElementById('monthOverlay').addEventListener('click',e=>{if(e.target.id==='monthOverlay')closeMonthModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeMonthModal();}});

init();
</script>
</body>
</html>
